      <script>
        window.__timelines = window.__timelines || {};

        const introTimeline = gsap.timeline({ paused: true });

      <script>
        (async () => {
        // Carregamento local equivalente a: import "three";
        const documentUrl = new URL(document.baseURI);
        const assetBase = documentUrl.pathname.includes("/preview/comp/")
          ? `${documentUrl.origin}${documentUrl.pathname.replace(/\/preview\/comp\/.*$/, "/preview/assets/")}`
          : new URL("assets/", document.baseURI).href;
        const THREE = await import(`${assetBase}vendor/three.module.js`);
        const { GLTFLoader } = await import(`${assetBase}vendor/addons/loaders/GLTFLoader.js`);

        globalThis.THREE = THREE;

        const WIDTH = 1920;
        const HEIGHT = 1080;
        const DURATION = 6;
        const canvas = document.getElementById("three-layer");
        const loaderNote = document.querySelector(".loader-note");

        const renderer = new THREE.WebGLRenderer({
          canvas,
          alpha: true,
          antialias: true,
          powerPreference: "high-performance",
        });
        renderer.setSize(WIDTH, HEIGHT, false);
        renderer.setPixelRatio(1);
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.18;
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(31, WIDTH / HEIGHT, 0.1, 100);
        camera.position.set(0, 0.8, 13.8);
        camera.lookAt(0, 0.15, 0);

        scene.add(new THREE.HemisphereLight(0xffffff, 0x7ecdc0, 3.2));

        const keyLight = new THREE.DirectionalLight(0xfff5d6, 4.4);
        keyLight.position.set(-4, 8, 7);
        keyLight.castShadow = true;
        keyLight.shadow.mapSize.set(2048, 2048);
        keyLight.shadow.camera.left = -9;
        keyLight.shadow.camera.right = 9;
        keyLight.shadow.camera.top = 8;
        keyLight.shadow.camera.bottom = -4;
        scene.add(keyLight);

        const fillLight = new THREE.DirectionalLight(0xd4a5e8, 2.2);
        fillLight.position.set(6, 3, 5);
        scene.add(fillLight);

        const rimLight = new THREE.DirectionalLight(0xa8d8f0, 1.8);
        rimLight.position.set(0, 5, -5);
        scene.add(rimLight);

        const shadowMaterial = new THREE.ShadowMaterial({ color: 0x2d2d2d, opacity: 0.22 });
        const shadowPlane = new THREE.Mesh(new THREE.PlaneGeometry(18, 7), shadowMaterial);
        shadowPlane.rotation.x = -Math.PI / 2;
        shadowPlane.position.set(0, -2.23, 0.35);
        shadowPlane.receiveShadow = true;
        scene.add(shadowPlane);

        const characters = [];
        let lastSeekTime = 0;

        const smoothstep = (value) => {
          const t = Math.max(0, Math.min(1, value));
          return t * t * (3 - 2 * t);
        };

        const easeOutBack = (value) => {
          const t = Math.max(0, Math.min(1, value));
          const c1 = 1.70158;
          const c3 = c1 + 1;
          return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
        };

        function prepareModel(gltf, config) {
          const wrapper = new THREE.Group();
          const model = gltf.scene;
          wrapper.add(model);
          scene.add(wrapper);

          model.traverse((node) => {
            if (!node.isMesh) return;
            node.castShadow = true;
            node.receiveShadow = true;
            if (node.material) {
              node.material.side = THREE.FrontSide;
              node.material.needsUpdate = true;
            }
          });

          const initialBox = new THREE.Box3().setFromObject(model);
          const initialSize = initialBox.getSize(new THREE.Vector3());
          const scale = config.height / Math.max(initialSize.y, 0.001);
          model.scale.setScalar(scale);

          const scaledBox = new THREE.Box3().setFromObject(model);
          const center = scaledBox.getCenter(new THREE.Vector3());
          model.position.x -= center.x;
          model.position.z -= center.z;
          model.position.y -= scaledBox.min.y;

          wrapper.position.set(config.x, -2.18, config.z);
          wrapper.rotation.y = config.yaw;
          wrapper.scale.setScalar(0.001);

          const mixer = new THREE.AnimationMixer(model);
          const clip = gltf.animations[0];
          if (clip) {
            const action = mixer.clipAction(clip);
            action.enabled = true;
            action.setLoop(THREE.LoopRepeat, 100);
            action.play();
          }

          characters.push({
            wrapper,
            mixer,
            clipDuration: clip ? clip.duration : DURATION,
            config,
          });
        }

        const modelConfigs = [
          {
            url: `${assetBase}characters/jesus-idle.glb`,
            x: 0,
            z: 0.45,
            yaw: 0,
            height: 4.7,
            delay: 0.72,
            sway: 0.035,
            phase: 0.2,
          },
          {
            url: `${assetBase}characters/crianca-01-celebration.glb`,
            x: -3.65,
            z: 0.05,
            yaw: -0.1,
            height: 3.35,
            delay: 1.0,
            sway: 0.075,
            phase: 1.1,
          },
          {
            url: `${assetBase}characters/crianca-02-rigged.glb`,
            x: 3.7,
            z: 0.0,
            yaw: 3.02,
            height: 3.4,
            delay: 1.08,
            sway: 0.065,
            phase: 2.2,
          },
          {
            url: `${assetBase}characters/crianca-03-celebration.glb`,
            x: 2.0,
            z: -0.22,
            yaw: 3.08,
            height: 3.25,
            delay: 1.25,
            sway: 0.07,
            phase: 3.1,
          },
        ];

        loaderNote.style.opacity = "1";

        const modelPromises = modelConfigs.map(
          (config) =>
            new Promise((resolve, reject) => {
              const loader = new GLTFLoader();
              loader.load(
                config.url,
                (gltf) => {
                  prepareModel(gltf, config);
                  resolve();
                },
                undefined,
                reject,
              );
            }),
        );

        function renderAt(rawTime) {
          const time = Math.max(0, Math.min(DURATION, Number(rawTime) || 0));
          lastSeekTime = time;
          const frozenTime = time >= 5 ? 5 : time;

          for (const character of characters) {
            const { wrapper, mixer, clipDuration, config } = character;
            const reveal = easeOutBack((frozenTime - config.delay) / 0.72);
            const settlePulse = 1 + Math.sin(Math.max(0, frozenTime - 1.72) * Math.PI * 2.2 + config.phase) * 0.018;
            const scale = Math.max(0.001, reveal) * settlePulse;
            wrapper.scale.setScalar(scale);
            wrapper.position.y = -2.18 + (1 - Math.min(reveal, 1)) * -1.25;
            wrapper.rotation.y = config.yaw + Math.sin(frozenTime * 1.35 + config.phase) * config.sway;
            wrapper.rotation.z = Math.sin(frozenTime * 1.05 + config.phase) * 0.012;

            const animationTime = Math.max(0, frozenTime - 1.0);
            mixer.setTime(animationTime % Math.max(clipDuration, 0.001));
          }

          const cameraReveal = smoothstep((frozenTime - 0.2) / 1.8);
          const cameraPush = smoothstep((frozenTime - 3.04) / 1.96);
          camera.position.z = 15.0 - cameraReveal * 1.15 - cameraPush * 0.42;
          camera.position.y = 1.02 - cameraReveal * 0.22;
          camera.position.x = Math.sin(frozenTime * 0.52) * 0.08;
          camera.lookAt(0, 0.08, 0.15);

          renderer.render(scene, camera);
        }

        globalThis.addEventListener("hf-seek", (event) => {
          renderAt(event.detail.time);
        });

        Promise.all(modelPromises)
          .then(() => {
            loaderNote.style.opacity = "0";
            renderAt(lastSeekTime || globalThis.__hfThreeTime || 0);
          })
          .catch((error) => {
            loaderNote.textContent = "Não foi possível carregar a turminha";
            loaderNote.style.opacity = "1";
            console.error(error);
          });

        renderAt(globalThis.__hfThreeTime || 0);
        })();
      </script>
